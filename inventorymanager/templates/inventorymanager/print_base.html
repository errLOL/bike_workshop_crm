<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Печать{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif;
            font-size: 12px;
            line-height: 1.4;
            color: #333;
        }
        .print-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .print-header {
            margin-bottom: 20px;
        }
        .company-logo {
            max-height: 80px;
            margin-bottom: 10px;
        }
        .company-details {
            font-size: 11px;
            color: #666;
        }
        .document-details {
            font-size: 12px;
        }
        hr {
            margin: 15px 0;
            border-top: 1px solid #ddd;
        }
        h5 {
            font-size: 13px;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #007bff;
            padding-left: 8px;
        }
        .info-table, .payment-table {
            width: 100%;
            font-size: 12px;
        }
        .info-table td, .payment-table td {
            padding: 4px 0;
        }
        .info-table .label, .payment-table .label {
            width: 120px;
            color: #666;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .items-table th, .items-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .items-table th {
            background-color: #f5f5f5;
            font-weight: 600;
        }
        .total-row {
            background-color: #f9f9f9;
        }
        .text-end {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
        .text-success {
            color: #28a745;
        }
        .text-danger {
            color: #dc3545;
        }
        .fw-bold {
            font-weight: 700;
        }
        .print-description {
            margin: 15px 0;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #ffc107;
        }
        .description-text {
            font-size: 11px;
            margin-top: 5px;
        }
        .signature-block {
            margin-top: 20px;
            font-size: 11px;
        }
        .print-notes {
            margin-top: 30px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
            font-size: 10px;
            color: #666;
        }
        .debt-row td {
            padding-top: 8px;
            border-top: 1px solid #ddd;
        }
        @media print {
            .btn, .no-print {
                display: none !important;
            }
            body {
                margin: 0;
                padding: 0;
            }
            .print-container {
                padding: 0;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
